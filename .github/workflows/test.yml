name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: "1.12.2.1565"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: deps-${{ hashFiles('deps.edn') }}
      - name: Unit tests (no Docker, no network services)
        run: clojure -M:unit-test

  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: "1.12.2.1565"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: deps-${{ hashFiles('deps.edn') }}
      - name: Lint (clj-kondo, .clj-kondo/config.edn baseline)
        run: clojure -M:lint
      - name: Layer-boundary check (law/shape/domain/application/infra)
        run: clojure -M:boundary-check
      - name: Interop ratchet (reports/interop.edn baseline)
        run: clojure -M:interop-inventory
